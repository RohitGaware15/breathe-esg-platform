version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: breathe-pg
    environment:
      POSTGRES_DB: breathe_esg
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - breathe-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: breathe-backend
    working_dir: /app
    environment:
      DEBUG: False
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/breathe_esg
      PYTHONUNBUFFERED: "1"
      ALLOWED_HOSTS: localhost,127.0.0.1,backend
      CORS_ALLOWED_ORIGINS: http://localhost:5173
    ports:
      - "8000:8000"
    networks:
      - breathe-network
    command: sh -c "sleep 15 && gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: breathe-frontend
    working_dir: /app
    ports:
      - "5173:5173"
    networks:
      - breathe-network
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      - backend

volumes:
  postgres_data:

networks:
  breathe-network:
    driver: bridge
